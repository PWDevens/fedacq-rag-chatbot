[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "fedacq-rag-chatbot"
version = "0.1.0"
description = "Federal Acquisition Regulation RAG Chatbot"
readme = "README.md"
requires-python = ">=3.10,<3.14"

dependencies = [
    "flask==3.1.3",
    "uvicorn==0.30.1",
    "hypercorn==0.17.3",
    "chromadb==1.5.8",
    "llama-index==0.12.0",
    "llama-index-core==0.12.52.post1",
    "llama-index-vector-stores-chroma==0.4.2",
    "llama-index-embeddings-huggingface==0.5.5",
    "llama-index-llms-huggingface==0.5.0",
    "llama-index-readers-file==0.4.11",
    "transformers==4.57.6",
    "accelerate==1.13.0",
    "sentencepiece==0.2.1",
    "huggingface-hub==0.36.2",
    "lxml==6.1.0",
    "gitpython==3.1.50",
    "python-dotenv==1.2.2",
    "requests==2.34.2",
    "tqdm==4.67.3",
]

[project.optional-dependencies]
dev = [
    "pytest==9.0.3",
    "pytest-cov==7.1.0",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["*"]
