[build-system]
name = "fedacq-rag-chatbot"
version = "0.1.0"
description = "FAR/DFARS RAG chatbot"
requires-python = ">=3.10"

dependencies = [
    "accelerate>=1.13.0",
    "chromadb>=1.5.8",
    "Flask>=3.1.3",
    "gitpython>=3.1.50",
    "huggingface-hub==0.36.2",
    "hypercorn>=0.17.3",
    "llama-index>=0.12.0",
    "llama-index-core>=0.12.52",
    "llama-index-embeddings-huggingface>=0.5.5",
    "llama-index-llms-huggingface>=0.5.0",
    "llama-index-readers-file>=0.4.11",
    "llama-index-vector-stores-chroma>=0.4.2",
    "lxml>=6.1.0",
    "python-dotenv>=1.2.2",
    "pytest>=9.0.3",
    "pytest-cov>=7.1.0",
    "requests>=2.34.2",
    "sentencepiece>=0.2.1",
    "tqdm>=4.67.3",
    "transformers==4.41.2",
    "uvicorn>=0.30.1",
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project.optional-dependencies]
dev = [
    "pytest==9.0.3",
    "pytest-cov==7.1.0",
]
phi3 = [
  "einops",
  "mamba-ssm",
  "causal-conv1d",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["*"]
