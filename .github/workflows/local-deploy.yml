name: Local RAG Build & App Launch

on:
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        lfs: true   # IMPORTANT: download LFS files

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install project
      run: pip install -e .

    - name: Install dependencies
      run: pip install -r requirements.lock
      
    - name: Run tests
      run: pytest -q

    - name: Build Docker image
      run: docker build -t fedacq-rag-chatbot .

    - name: Run container
      run: docker run -d -p 7860:7860 --name ragbot fedacq-rag-chatbot

    - name: Healthcheck container
      run: |
        sleep 5
        curl -f http://localhost:7860/ || (docker logs ragbot && exit 1)

    - name: Stop container
      if: always()
      run: docker stop ragbot
 
    - name: Save Docker image as artifact
      run: docker save fedacq-rag-chatbot | gzip > fedacq-rag-chatbot.tar.gz

    - name: Upload Docker image artifact
      uses: actions/upload-artifact@v4
      with:
        name: fedacq-rag-chatbot-image
        path: fedacq-rag-chatbot.tar.gz

