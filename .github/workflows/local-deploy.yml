name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        lfs: true
        submodules: false

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: "pip"
        cache-dependency-path: |
          requirements.lock
          pyproject.toml

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.lock
        pip install .[dev]

    - name: Run tests
      env:
        RAG_TEST_MODE: "1"
      run: pytest -q

    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/share/powershell
        sudo rm -rf /usr/local/share/chromium
        sudo rm -rf /usr/local/share/edge
        docker system prune -af


    - name: Build Docker image
      run: docker build -t fedacq-rag-chatbot .

    - name: Run container
      run: docker run -d -p 7860:7860 --name ragbot fedacq-rag-chatbot

    - name: Healthcheck container
      run: |
        sleep 10
        docker logs ragbot
        curl -f http://localhost:7860/health || exit 1

    - name: Stop container
      if: always()
      run: docker stop ragbot || true

    - name: Save Docker image as artifact
      run: docker save fedacq-rag-chatbot | gzip > fedacq-rag-chatbot.tar.gz

    - name: Upload Docker image artifact
      uses: actions/upload-artifact@v4
      with:
        name: fedacq-rag-chatbot-image
        path: fedacq-rag-chatbot.tar.gz
